### 3.5.2. Llama3 학습 파라미터 설정

# 사용하고자 하는 모델의 아이디. 허깅페이스에 등록된 것 적으면 됨
model_name: "meta-llama/Meta-Llama-3.1-8B-Instruct"

# 학습에 사용할 데이터셋이 위치한 경로
dataset_path: "."

# 모델이 처리할 수 있는 최대 시퀀스 길이
max_seq_length: 512

# 모델 학습 과정에서 생성되는 학습된 모델, 학습 중간에 저장되는 체크포인트 파일들을 저장할 디렉터리
output_dir: "./llama-3.1-korean-8b-hf-20-epoch"

# 모델 학습 과정에서 발생하는 로그와 성능 지표를 기록할지 저장하는 옵션.
report_to: "wandb"

# 신경망 가중치를 얼마나 크게 조정할지 정함. 높으면 최적점을 빠르게 찾지만, 학습이 불안정/낮으면 안정적이지만 학습이 느림
learning_rate: 0.00005

# 학습률 스케줄러, 학습 과정에서 학습률의 변화를 관리함
lr_scheduler_type: "linear"

# 에폭이며 전체 데이터셋을 한 번 학습하는 주기를 의미함(에폭 수를 늘리면 모델이 더 많이 학습 / 과적합의 위험도 증가할 수 있음)
num_train_epochs: 5

# 각 GPU 또는 CPU에서 한 번에 처리할 학습 데잉터의 개수
per_device_train_batch_size: 2

# 평가 시 각 디바이스에서 처리할 데이터의 개수
per_device_eval_batch_size: 2

# 그레이디언트 누적 기법을 사용해 가상의 더 큰 배치 크기 효과를 얻는 방법
gradient_accumulation_steps: 4

# 모델 학습에 사용할 최적화 알고리즘. 현재는 파이토치에서 제공하는 최적화된 AdamW구현임
optim: "adamw_torch_fused"

# 로그를 기록할 주기를 스텝 단위로 설정 
logging_steps: 10

# 모델 체크 포인트를 저장하는 전략을 설정
save_strategy: "epoch"

# 과적합을 방지하고 모델의 일반화 성능을 향상 시키는 데 사용
weight_decay: 0.01

# 그레이디언트 클리핑의 임계값을 지정함.
# 이는 그레이디언트의 크기가 지나치게 커지는 것을 방지하는 기법
max_grad_norm: 0.5

# 학습률 웜업 기법을 제어. 웜업은 학습 초기에 학습률을 매우 작은 값에서 시작해 점진적으로 목표 학습률까지 증가시키는 방법
# 이 기법의 주요 목적은 학습 초기의 급격한 파라미터 변화를 방지하고, 모델이 안정적으로 학습을 시작할 수 있게 하는 것
warmup_ratio: 0.03

# bfloat16정밀도를 사용하도록 활성화함. 이는 32비트 부동소수점의 자수 부분은 그대로 유지하면서 가수 부분을 줄인 16비트 형식
bf16: true

# 엔비디아의 TensorFloat-32 형식을 활성화함. 
# 이는 19비트 부동소수점 형식으로, float32의 정밀도와 float16의 속도 사이의 균형을 제공함
tf32: true

# 그레이디언트 체크포인팅 기법을 활성화함. 이는 대규모 신경망 모델 학습시 메모리 사용을 최적화하는 고급 기술
gradient_checkpointing: true

# 이는 Fully Sharded Data Parallel을 활성화해 모델을 여러 GPU에 분산시켜 메모리 효율을 높이는 기술
fsdp: "full_shard auto_wrap"

# 추가 설정들은 이 분산 처리의 효율성을 더욱 높여줌
fsdp_config:
  backward_prefetch: "backward_pre"
  forward_prefetch: "false"
  use_orig_params: "false"